<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>Administración - Alessia Nic</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <meta name="theme-color" content="#f8f9fa"> 
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="script.js"></script> 
</head>
<body class="d-flex flex-column min-vh-100 p-0 admin-bg">
    
    <header class="app-header text-center pb-2 pt-4 px-3 bg-transparent">
        <div class="d-flex align-items-center justify-content-center flex-column">
            <div class="logo-circle bg-dark shadow-sm mb-2">
                <i class="bi bi-laptop text-white fs-1"></i>
            </div>
            <h1 class="fw-bold fs-4 text-dark mb-0 tracking-tight">PANEL ADMIN</h1>
            <p class="text-muted small fw-semibold">Gestión de Inventario</p>
        </div>
    </header>

    <div class="container mt-2 mb-3 desktop-only text-start">
        <a href="index.html" class="btn btn-outline-dark rounded-pill px-4 shadow-sm fw-bold border-2">
            <i class="bi bi-arrow-left me-2"></i> Volver a Agregar
        </a>
    </div>

    <main class="container flex-grow-1 px-3 px-md-4">

        <section class="card app-card shadow-sm mb-4 border-0">
            <div class="card-body p-0 pt-4">
                <h2 id="listTitle" class="h5 fw-bold text-dark px-4 mb-3 d-flex align-items-center">
                    <i class="bi bi-database me-2"></i> Base de Datos
                </h2>
                <div id="dynamicContent" class="table-responsive app-table-wrapper px-3 pb-3">
                </div>
            </div>
        </section>

        <div class="card app-card shadow-sm border-0 bg-success-subtle mb-5" id="downloadCard" style="display:none;">
             <div class="card-body text-center p-4">
                <i class="bi bi-file-earmark-excel-fill text-success mb-2" style="font-size: 3rem;"></i>
                <h3 class="fw-bold h5 text-dark mb-1">Exportar Reporte</h3>
                <p class="text-success-emphasis small mb-3 fw-medium">Respaldo en formato Excel</p>
                <button id="downloadExcelBtn" class="btn btn-success w-100 btn-lg rounded-pill shadow-sm fw-bold py-3">
                    <i class="bi bi-download me-2"></i> DESCARGAR .XLSX
                </button>
            </div>
        </div>

    </main>

    <nav class="mobile-bottom-bar shadow-lg">
        <div class="d-flex justify-content-around align-items-center h-100">
            <a href="index.html" class="nav-item text-center text-decoration-none text-muted">
                <i class="bi bi-house-door fs-4 d-block mb-1"></i>
                <span class="small fw-bold">Inicio</span>
            </a>
            <a href="admin.html" class="nav-item active text-center text-decoration-none">
                <i class="bi bi-shield-lock-fill fs-4 d-block mb-1"></i>
                <span class="small fw-bold">Admin</span>
            </a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
