<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Admin - Glam Nic</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="script.js"></script>
</head>
<body class="bg-light d-flex flex-column min-vh-100 p-0">
    <header class="header bg-primary shadow-lg p-3 text-center text-white">
        <h1 class="mb-0 fw-bold fs-3">ADMINISTRACIÓN GLAM NIC</h1>
    </header>

    <div class="container mt-3"><a href="index.html" class="btn btn-rosadito mb-3">Volver</a></div>

    <main class="container flex-grow-1">
        <section class="card shadow-lg mb-4 border-0 rounded-4">
            <div class="card-body p-4">
                <h2 id="listTitle" class="card-title pb-2 mb-4 border-bottom border-primary border-2 fs-5 text-primary fw-bold">Listado Maestro</h2>
                <div id="dynamicContent" class="table-responsive"></div>
            </div>
        </section>
        
        <div class="card shadow-lg mb-4 border-0 rounded-4" id="downloadCard">
             <div class="card-body text-center p-4">
                <button id="downloadExcelBtn" class="btn btn-secondary rounded-pill fw-bold px-5 shadow-sm">Descargar Excel</button>
            </div>
        </div>
    </main>
</body>
</html>
