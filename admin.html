<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>Administración - Glam Nic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="script.js"></script> 
</head>
<body class="d-flex flex-column min-vh-100 p-0 admin-bg">
    
    <header class="header shadow-sm p-4 text-center">
        <div class="container d-flex flex-column align-items-center">
            <div class="icon-circle mb-2 shadow-sm bg-dark text-white">
                <i class="bi bi-laptop fs-2"></i>
            </div>
            <h1 class="mb-1 fw-bold fs-3 text-dark">PANEL DE ADMINISTRACIÓN</h1>
            <p class="mb-0 text-muted small fw-medium">Gestión Completa de Inventario y Pedidos</p>
        </div>
    </header>

     <div class="container mt-4 mb-2">
        <a href="index.html" class="btn btn-outline-dark shadow-sm rounded-pill border-2 fw-bold">
            <i class="bi bi-arrow-left me-2"></i> Volver a Agregar Pedidos
        </a>
    </div>

    <main class="container flex-grow-1">

        <section class="card shadow-lg mb-4 border-0 rounded-4 glass-card">
            <div class="card-body p-4 p-md-5">
                <h2 id="listTitle" class="card-title pb-3 mb-4 border-bottom fs-4 text-dark fw-bold d-flex align-items-center">
                    <i class="bi bi-database me-2"></i> Cargando datos...
                </h2>
                <div id="dynamicContent" class="table-responsive rounded-3 shadow-sm custom-scrollbar">
                </div>
            </div>
        </section>

        <div class="card shadow-lg mb-5 border-0 rounded-4 download-card" id="downloadCard" style="display:none;">
             <div class="card-body text-center p-5">
                <div class="mb-4">
                    <i class="bi bi-file-earmark-excel text-success" style="font-size: 4rem;"></i>
                </div>
                <h3 class="fw-bold mb-2 text-dark">Exportar Datos</h3>
                <p class="text-muted mb-4">Genera un reporte detallado en Excel de todos los pedidos ingresados.</p>
                <button id="downloadExcelBtn" class="btn btn-success btn-lg rounded-pill px-5 py-3 shadow-sm fw-bold btn-hover-effect">
                    <i class="bi bi-download me-2"></i> DESCARGAR EXCEL
                </button>
            </div>
        </div>

    </main>

    <footer class="footer bg-white p-4 text-center mt-auto border-top shadow-sm">
        <p class="mb-0 text-muted fw-medium small">
            <i class="bi bi-shield-lock text-dark me-1"></i> Panel Admin &copy; 2024 Glam Nic
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
