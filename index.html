<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>SISTEMA GLAM NIC</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body class="bg-light d-flex flex-column min-vh-100 p-0">
    <header class="header bg-primary shadow-lg p-3 text-center text-white">
        <h1 class="mb-0 fw-bold fs-3">SISTEMA GLAM NIC</h1>
        <p class="mb-0 opacity-75 small">Gestión en la Nube</p>
    </header>

    <div class="container mt-3">
        <a href="admin.html" class="btn btn-rosadito mb-3 shadow-sm">Administrar Pedidos</a>
    </div>

    <main class="container flex-grow-1">
        <section class="card shadow-lg mb-4 border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="card-title pb-2 mb-4 border-bottom border-primary border-2 fs-5 text-primary fw-bold">Nuevo Artículo</h2>
                <form id="orderForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small">Artículo</label>
                        <input type="text" id="articulo" required class="form-control border-primary">
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4"><label class="small">Costo Shein ($)</label><input type="number" id="precioTotalUSD" step="0.01" required class="form-control border-primary"></div>
                        <div class="col-md-4"><label class="small">Envío ($)</label><input type="number" id="costoEnvioUSD" step="0.01" required class="form-control border-primary"></div>
                        <div class="col-md-4"><label class="small">Unidades</label><input type="number" id="cantUnidades" value="1" min="1" required class="form-control border-primary"></div>
                    </div>
                    <div class="mb-3 mt-4 p-3 border rounded bg-light">
                        <label class="fw-semibold text-primary">Precio Venta Unitario (C$)</label>
                        <input type="number" id="precioVentaC" step="0.01" required class="form-control border-primary">
                        <div id="feedbackGanancia" class="mt-3 small fw-bold"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2">GUARDAR EN LA NUBE</button>
                </form>
            </div>
        </section>

        <section class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4">
                <h2 class="card-title pb-2 mb-4 border-bottom border-primary border-2 fs-5 text-primary fw-bold">Vista Previa</h2>
                <div id="tableContainer" class="table-responsive"></div>
            </div>
        </section>
    </main>
</body>
</html>
